name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A newer push makes an in-flight run irrelevant; cancel it rather than queue behind it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # mvnw is committed with mode 100644, not 100755. It was authored on Windows, where
      # core.fileMode is false and Git cannot see exec bits — and a path-scoped `git commit`
      # re-reads the working tree, so `git update-index --chmod=+x` does not survive. Rather than
      # depend on the mode being right, set it here.
      - name: Make the Maven wrapper executable
        run: chmod +x mvnw

      # Testcontainers needs a Docker daemon; ubuntu-latest ships one, so no service container
      # is required. TransferConcurrencyStressTest runs against a real Postgres through it.
      - name: Verify
        run: ./mvnw -B --no-transfer-progress verify

      # Surefire XML is the only durable record of which tests ran once the runner is gone.
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7
          if-no-files-found: error

  docker:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - account-service
          - payment-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build only — nothing is pushed. This proves each image still assembles; publishing waits
      # until there is somewhere to deploy to.
      #
      # Each Dockerfile is a multi-stage build that runs Maven inside the image, so without a cache
      # every service re-resolves the whole dependency tree. The GHA cache is scoped per service so
      # they don't evict each other.
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: false
          tags: banking/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
