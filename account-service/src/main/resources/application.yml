spring:
  application:
    name: account-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/banking_db?currentSchema=banking_account
    username: ${DB_USER:banking_user}
    password: ${DB_PASSWORD:banking_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    schemas: banking_account
    default-schema: banking_account

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: banking_account

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_pass}
      connect-timeout: 3s
      timeout: 2s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1s

server:
  port: 8082

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-long-enough}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

internal:
  secret: ${INTERNAL_SECRET:internal-secret-change-me}

services:
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8083}

logging:
  level:
    org.apache.kafka.clients.NetworkClient: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers,retries
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_ENDPOINT:http://localhost:4318/v1/traces}

resilience4j:
  circuitbreaker:
    instances:
      redis:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        record-exceptions:
          - org.springframework.data.redis.RedisConnectionFailureException
          - io.lettuce.core.RedisException
          - java.util.concurrent.TimeoutException
          - java.io.IOException
        ignore-exceptions:
          - com.banking.common.exception.AppException
      payment-service:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - feign.FeignException
          - java.net.ConnectException
          - java.util.concurrent.TimeoutException

  retry:
    instances:
      redis:
        max-attempts: 3
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        exponential-max-wait-duration: 3s
        retry-exceptions:
          - org.springframework.data.redis.RedisConnectionFailureException
          - io.lettuce.core.RedisException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:
          - com.banking.common.exception.AppException
