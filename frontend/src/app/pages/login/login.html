<div class="auth-page">
  <p-card styleClass="auth-card">
    <div class="auth-brand">
      <i class="pi pi-building-columns"></i>
      <h2>BankApp</h2>
    </div>
    <h3>Welcome back</h3>
    <p class="auth-subtitle">Sign in to your account</p>

    @if (errorMsg()) {
      <p-message severity="error" [text]="errorMsg()" styleClass="auth-error" />
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <p-floatlabel variant="on">
        <input pInputText id="email" formControlName="email" type="email" fluid />
        <label for="email">Email address</label>
      </p-floatlabel>

      <p-floatlabel variant="on">
        <p-password id="password" formControlName="password" [feedback]="false" [fluid]="true" />
        <label for="password">Password</label>
      </p-floatlabel>

      <p-button
        label="Sign in"
        type="submit"
        [loading]="loading()"
        [disabled]="form.invalid"
        [fluid]="true"
      />
    </form>

    <p class="auth-link">
      Don't have an account? <a routerLink="/register">Register</a>
    </p>
  </p-card>
</div>
