spring:
  application:
    name: account-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/banking_db?currentSchema=banking_account
    username: ${DB_USER:banking_user}
    password: ${DB_PASSWORD:banking_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    schemas: banking_account
    default-schema: banking_account

  jpa:
    # Hold the JDBC connection only for the service call, not until the response is written.
    # Without this a cache hit still occupies a pool slot for the whole request.
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: banking_account

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_pass}
      connect-timeout: 3s
      timeout: 2s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1s

banking:
  cache:
    # Backstop only — correctness comes from eviction on every mutation. This bounds how long a
    # dropped eviction (e.g. Redis blip) could keep serving a stale balance.
    account-ttl: ${ACCOUNT_CACHE_TTL:60s}

server:
  port: 8082

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-long-enough}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

internal:
  secret: ${INTERNAL_SECRET:internal-secret-change-me}

services:
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8083}

logging:
  level:
    org.apache.kafka.clients.NetworkClient: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers,retries
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_ENDPOINT:http://localhost:4318/v1/traces}

resilience4j:
  circuitbreaker:
    instances:
      redis:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        record-exceptions:
          - org.springframework.data.redis.RedisConnectionFailureException
          # Spring Data translates Lettuce's RedisCommandTimeoutException into this, so without it
          # the most common Redis failure — a command timing out while the server is reachable but
          # unresponsive — was counted as a SUCCESS and the breaker never opened. Note that
          # record-exceptions is a whitelist: anything unlisted is treated as a successful call.
          - org.springframework.dao.QueryTimeoutException
          - io.lettuce.core.RedisException
          - java.util.concurrent.TimeoutException
          - java.io.IOException
        ignore-exceptions:
          - com.banking.common.exception.AppException
      payment-service:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - feign.FeignException
          - java.net.ConnectException
          - java.util.concurrent.TimeoutException

  retry:
    instances:
      redis:
        max-attempts: 3
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        exponential-max-wait-duration: 3s
        # QueryTimeoutException is deliberately absent here even though it is recorded by the
        # circuit breaker: the command already waited out the full timeout, so retrying it twice
        # more turns a 2s failure into 6s. Let the breaker open instead.
        retry-exceptions:
          - org.springframework.data.redis.RedisConnectionFailureException
          - io.lettuce.core.RedisException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:
          - com.banking.common.exception.AppException
