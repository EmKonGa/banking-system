services:

  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: banking_oracle
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-banking_pass}
      APP_USER: ${ORACLE_USER:-banking_user}
      APP_USER_PASSWORD: ${ORACLE_USER_PASSWORD:-banking_pass}
    ports:
      - "1522:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 3m

  redis:
    image: redis:7-alpine
    container_name: banking_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: banking_kafka
    environment:
      # KRaft mode — no Zookeeper needed
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: banking_gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      ACCOUNT_SERVICE_URL: http://account-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-must-be-long-enough}
      OTEL_EXPORTER_ENDPOINT: http://tempo:4318/v1/traces
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      account-service:
        condition: service_started

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: banking_auth
    ports:
      - "8081:8081"
    environment:
      DB_HOST: oracle
      DB_PORT: 1521
      ORACLE_USER: ${ORACLE_USER:-banking_user}
      ORACLE_USER_PASSWORD: ${ORACLE_USER_PASSWORD:-banking_pass}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-must-be-long-enough}
      OTEL_EXPORTER_ENDPOINT: http://tempo:4318/v1/traces
    depends_on:
      oracle:
        condition: service_healthy
      redis:
        condition: service_healthy

  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    container_name: banking_account
    ports:
      - "8082:8082"
    environment:
      DB_HOST: oracle
      DB_PORT: 1521
      ORACLE_USER: ${ORACLE_USER:-banking_user}
      ORACLE_USER_PASSWORD: ${ORACLE_USER_PASSWORD:-banking_pass}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-must-be-long-enough}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-internal-secret-change-me}
      PAYMENT_SERVICE_URL: http://payment-service:8083
      OTEL_EXPORTER_ENDPOINT: http://tempo:4318/v1/traces
    depends_on:
      oracle:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: banking_payment
    ports:
      - "8083:8083"
    environment:
      DB_HOST: oracle
      DB_PORT: 1521
      ORACLE_USER: ${ORACLE_USER:-banking_user}
      ORACLE_USER_PASSWORD: ${ORACLE_USER_PASSWORD:-banking_pass}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-must-be-long-enough}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-internal-secret-change-me}
      ACCOUNT_SERVICE_URL: http://account-service:8082
      OTEL_EXPORTER_ENDPOINT: http://tempo:4318/v1/traces
    depends_on:
      oracle:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      account-service:
        condition: service_started

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: banking_notification
    ports:
      - "8084:8084"
    environment:
      DB_HOST: oracle
      DB_PORT: 1521
      ORACLE_USER: ${ORACLE_USER:-banking_user}
      ORACLE_USER_PASSWORD: ${ORACLE_USER_PASSWORD:-banking_pass}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-must-be-long-enough}
      OTEL_EXPORTER_ENDPOINT: http://tempo:4318/v1/traces
    depends_on:
      oracle:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:latest
    container_name: banking_redisinsight
    ports:
      - "9001:5540"
    depends_on:
      - redis

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: banking_kafka_ui
    ports:
      - "9002:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      LOGGING_LEVEL_REACTOR_NETTY: ERROR
      LOGGING_LEVEL_IO_NETTY: ERROR
    depends_on:
      - kafka

  prometheus:
    image: prom/prometheus:latest
    container_name: banking_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml

  tempo:
    image: grafana/tempo:2.6.1
    container_name: banking_tempo
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yml
      - tempo_data:/var/tempo

  grafana:
    image: grafana/grafana:latest
    container_name: banking_grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo

volumes:
  oracle_data:
  redis_data:
  kafka_data:
  tempo_data:
  grafana_data: