<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <i class="pi pi-building-columns brand-icon"></i>
      <span class="brand-name">BankApp</span>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <i class="pi pi-home"></i>
        <span>Dashboard</span>
      </a>
      <a routerLink="/accounts" routerLinkActive="active" class="nav-item">
        <i class="pi pi-wallet"></i>
        <span>Accounts</span>
      </a>
      <a routerLink="/transfer" routerLinkActive="active" class="nav-item">
        <i class="pi pi-arrow-right-arrow-left"></i>
        <span>Transfer</span>
      </a>
      <a routerLink="/notifications" routerLinkActive="active" class="nav-item">
        <i class="pi pi-bell"></i>
        <span>Notifications</span>
        @if (unreadCount() > 0) {
          <span class="nav-badge">{{ unreadCount() }}</span>
        }
      </a>
    </nav>

    <div class="sidebar-footer">
      <p-avatar icon="pi pi-user" shape="circle" size="normal" />
      <p-button
        icon="pi pi-sign-out"
        [text]="true"
        severity="secondary"
        pTooltip="Logout"
        tooltipPosition="right"
        (onClick)="logout()"
      />
    </div>
  </aside>

  <main class="main-content">
    <router-outlet />
  </main>
</div>
