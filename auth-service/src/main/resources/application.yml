spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:oracle:thin:@${DB_HOST:localhost}:${DB_PORT:1522}/XEPDB1
    username: ${ORACLE_USER:banking_user}
    password: ${ORACLE_USER_PASSWORD:banking_pass}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_pass}
      connect-timeout: 3s
      timeout: 2s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1s

server:
  port: 8081

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-long-enough}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

logging:
  level:
    org.apache.kafka.clients.NetworkClient: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers,circuitbreakerevents,retries,retryevents
  health:
    circuitbreakers:
      enabled: true
    retries:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_ENDPOINT:http://localhost:4318/v1/traces}

resilience4j:
  circuitbreaker:
    instances:
      redis:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 80
        record-exceptions:
          - org.springframework.data.redis.RedisConnectionFailureException
          - io.lettuce.core.RedisException
          - java.util.concurrent.TimeoutException
          - java.io.IOException
        ignore-exceptions:
          - com.banking.common.exception.AppException

  retry:
    instances:
      redis:
        max-attempts: 3
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        exponential-max-wait-duration: 3s
        retry-exceptions:
          - org.springframework.data.redis.RedisConnectionFailureException
          - io.lettuce.core.RedisException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:
          - com.banking.common.exception.AppException
